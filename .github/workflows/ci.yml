name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL3
        run: brew install sdl3

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release
